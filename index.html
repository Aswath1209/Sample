<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Earn Rewards</title>
    <!-- Telegram SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- OnClicka SDK -->
    <script src="https://js.onclckvd.com/in-stream-ad-admanager/tma.js"></script>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            width: 90%;
            max-width: 400px;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 15px;
            padding: 30px 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .btn {
            background-color: var(--tg-theme-button-color, #248bfe);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 18px;
            width: 100%;
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .reward-box { display: none; margin-top: 20px; }
        .status { font-size: 14px; opacity: 0.7; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="ad-prompt">
            <h2>Earn 500 Coins</h2>
            <p>Watch a short video ad to claim your reward!</p>
            <button class="btn" id="watch-btn">📺 Watch Video Ad</button>
            <div class="status" id="status">Initializing ad engine...</div>
        </div>

        <div class="reward-box" id="reward-box">
            <h2 style="color: #4caf50;">✅ Success!</h2>
            <p>You've earned your reward.</p>
            <button class="btn" id="claim-btn">💰 Claim 500 Coins</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const watchBtn = document.getElementById('watch-btn');
        const claimBtn = document.getElementById('claim-btn');
        const statusEl = document.getElementById('status');
        const adPrompt = document.getElementById('ad-prompt');
        const rewardBox = document.getElementById('reward-box');

        let globalShowAd = null;

        // Function to initialize the engine
        function startEngine() {
            if (!window.initCdTma) {
                statusEl.innerText = "Error: SDK script not found.";
                return;
            }

            statusEl.innerText = "Connecting to OnClicka...";
            
            window.initCdTma({ id: 440613 })
                .then(show => {
                    if (show) {
                        globalShowAd = show;
                        statusEl.innerText = "Ad ready! Click below.";
                        watchBtn.disabled = false;
                    } else {
                        statusEl.innerText = "Error: Ad engine returned empty.";
                    }
                })
                .catch(e => {
                    statusEl.innerText = "Init Error: " + (e.message || "Rejected.");
                });
        }

        setTimeout(startEngine, 1000);

        watchBtn.addEventListener('click', () => {
            console.log("Button clicked. globalShowAd type:", typeof globalShowAd);
            
            if (typeof globalShowAd === 'function') {
                statusEl.innerText = "Opening ad...";
                globalShowAd()
                    .then(() => {
                        adPrompt.style.display = "none";
                        rewardBox.style.display = "block";
                    })
                    .catch(e => {
                        statusEl.innerText = "Playback Error: " + (e.message || "No inventory.");
                    });
            } else {
                statusEl.innerText = "Error: globalShowAd is " + typeof globalShowAd;
            }
        });

        claimBtn.addEventListener('click', () => {
            tg.sendData("reward_completed");
            tg.close();
        });
    </script>
</body>
</html>
